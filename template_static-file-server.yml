version: "3.9"

services:
  static-file-server:
    image: halverneus/static-file-server:latest
    container_name: static-file-server
    restart: unless-stopped
    networks:
      punte:
        ipv4_address: 172.18.1.3
    ports:
      - "80:8080"
    volumes:
      - /home/docker/static-file-server:/web:ro

networks:
  punte:
    external: true
